<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: url("images/bg_admin.png") no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-box {
            background: rgba(255,255,255,0.9);
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            width: 300px;
        }
        h2 {
            color: darkblue;
            margin-bottom: 20px;
        }
        input[type="text"], input[type="password"] {
            width: 90%;
            padding: 8px;
            margin: 10px 0;
        }
        .btn {
            padding: 8px 20px;
            margin: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            color: white;
        }
        .login-btn { background-color: green; }
        .home-btn { background-color: teal; text-decoration: none; }
        #error { color: red; margin-top: 10px; }
    </style>
    <script>
        function checkLogin(event) {
            event.preventDefault();
            let username = document.getElementById("username").value;
            let password = document.getElementById("password").value;

            if (username === "admin" && password === "admin") {
                window.location.href = "admin.html"; // redirect to admin portal
            } else {
                document.getElementById("error").innerText = "Invalid login. Try again.";
            }
        }
    </script>
</head>
<body>
    <div class="login-box">
        <h2>Admin Login</h2>
        <form onsubmit="checkLogin(event)">
            <input type="text" id="username" name="username" placeholder="Username" required><br>
            <input type="password" id="password" name="password" placeholder="Password" required><br>
            <input type="submit" value="Login" class="btn login-btn">
            <a href="Index.html" class="btn home-btn">Home</a>
        </form>
        <div id="error"></div>
    </div>
</body>
</html>
